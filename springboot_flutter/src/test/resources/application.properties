# ===== CONFIGURACIÓN DE BASE DE DATOS PARA TESTS (H2) =====
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / HIBERNATE =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===== JWT CONFIGURATION PARA TESTS =====
app.jwt.secret=testSecretKey_testSecretKey_testSecretKey_testSecretKey_testSecretKey_testSecretKey
app.jwt.expiration=3600000
app.jwt.refresh-expiration=86400000

# ===== LOGGING =====
logging.level.com.example.springboot_flutter=DEBUG
