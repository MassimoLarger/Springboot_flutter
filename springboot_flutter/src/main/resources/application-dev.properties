# ===== PERFIL DEV =====
spring.config.activate.on-profile=dev

# ===== BASE DE DATOS LOCAL =====
spring.datasource.url=jdbc:mysql://localhost:3306/springboot_flutter?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:tu_contraseña}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA DEV (DDL automático, SQL visible) =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===== LOGGING DETALLADO =====
logging.level.com.example.springboot_flutter=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===== CORS PERMISIVO =====
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:8080,http://localhost:5500

# ===== ACTUATOR DEV (más información) =====
management.endpoint.health.show-details=always