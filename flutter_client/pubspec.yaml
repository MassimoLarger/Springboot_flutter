name: flutter_client
description: Aplicación Flutter para gestión de productos con autenticación JWT
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Networking
  dio: ^5.4.0
  dio_smart_retry: ^5.0.0
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  
  # Navigation
  go_router: ^13.0.0
  
  # JSON Serialization
  json_annotation: ^4.8.1
  
  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  
  # Utilities
  equatable: ^2.0.5
  intl: ^0.18.1
  image_picker: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
